<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defensores de Gamonal - Arcade Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    width: 600px;
    height: 800px;
  }
  #gameCanvas {
    display: block;
    border: 1px solid #00ffcc22;
    box-shadow: 0 0 40px #00ffcc33, 0 0 80px #ff336611;
  }
  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #startScreen, #gameOverScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    pointer-events: all;
  }
  #gameOverScreen { display: none; }
  .glitch-title {
    font-size: 2.6rem;
    font-weight: 900;
    color: #00ffcc;
    text-shadow: 2px 0 #ff3366, -2px 0 #00ffcc;
    letter-spacing: 2px;
    text-align: center;
    animation: glitch 2s infinite;
    line-height: 1.2;
  }
  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    color: #ff3366;
    font-size: 0.85rem;
    letter-spacing: 6px;
    margin: 10px 0 40px;
    text-transform: uppercase;
  }
  @keyframes glitch {
    0%,95%,100% { text-shadow: 2px 0 #ff3366, -2px 0 #00ffcc; transform: none; }
    96% { text-shadow: -3px 0 #ff3366, 3px 0 #00ffcc; transform: translateX(2px); }
    97% { text-shadow: 3px 0 #ff3366, -3px 0 #00ffcc; transform: translateX(-2px); }
    98% { text-shadow: -2px 2px #ff3366, 2px -2px #00ffcc; transform: skewX(2deg); }
  }
  .neon-btn {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 3px;
    padding: 14px 36px;
    border: 2px solid #00ffcc;
    background: transparent;
    color: #00ffcc;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin: 8px;
    pointer-events: all;
  }
  .neon-btn:hover {
    background: #00ffcc;
    color: #000;
    box-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc44;
  }
  .neon-btn.red {
    border-color: #ff3366;
    color: #ff3366;
  }
  .neon-btn.red:hover {
    background: #ff3366;
    color: #000;
    box-shadow: 0 0 20px #ff3366, 0 0 40px #ff336644;
  }
  .controls-hint {
    font-family: 'Share Tech Mono', monospace;
    color: #ffffff44;
    font-size: 0.7rem;
    letter-spacing: 2px;
    margin-top: 30px;
    text-align: center;
    line-height: 2;
  }
  .score-display {
    font-size: 2rem;
    color: #00ffcc;
    font-weight: 900;
    margin: 10px 0;
  }
  .game-over-title {
    font-size: 3rem;
    font-weight: 900;
    color: #ff3366;
    text-shadow: 0 0 20px #ff3366;
    margin-bottom: 10px;
  }
  .final-score-label {
    font-family: 'Share Tech Mono', monospace;
    color: #ffffff66;
    font-size: 0.75rem;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  #bossBar {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 300px;
    display: none;
    pointer-events: none;
  }
  #bossBarLabel {
    font-family: 'Share Tech Mono', monospace;
    color: #ff3366;
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 3px;
  }
  #bossBarOuter {
    width: 100%;
    height: 10px;
    border: 1px solid #ff3366;
    background: #1a0010;
  }
  #bossBarInner {
    height: 100%;
    background: linear-gradient(90deg, #ff3366, #ff6699);
    box-shadow: 0 0 8px #ff3366;
    transition: width 0.1s;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="600" height="800"></canvas>
  <div id="bossBar">
    <div id="bossBarLabel">⚠ OMEGA BOSS ⚠</div>
    <div id="bossBarOuter"><div id="bossBarInner" style="width:100%"></div></div>
  </div>
  <div id="ui">
    <div id="startScreen">
      <div class="glitch-title">DEFENSORES<br>DE GAMONAL</div>
      <div class="subtitle">Arcade Edition</div>
      <button class="neon-btn" id="startBtn">▶ INICIAR MISIÓN</button>
      <div class="controls-hint">
        ↑ ↓ ← → MOVER &nbsp;|&nbsp; ESPACIO DISPARAR<br>
        Recoge power-ups · Sobrevive al OMEGA BOSS
      </div>
    </div>
    <div id="gameOverScreen">
      <div class="game-over-title">GAME OVER</div>
      <div class="final-score-label">PUNTUACIÓN FINAL</div>
      <div class="score-display" id="finalScore">0</div>
      <div class="btn-row">
        <button class="neon-btn" id="retryBtn">↺ REINTENTAR</button>
        <button class="neon-btn red" id="menuBtn">⌂ MENÚ</button>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 800;

// UI refs
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl = document.getElementById('finalScore');
const bossBar = document.getElementById('bossBar');
const bossBarInner = document.getElementById('bossBarInner');

// State
let state = 'START';
let keys = {};
let score = 0, lives = 3, gameTime = 0;
let doubleShot = false, doubleShotTimer = 0;
const DOUBLE_SHOT_MAX = 10000;
let player, bullets, enemies, asteroids, enemyBullets, particles, powerups;
let boss = null, bossActive = false;
let respawnTimer = 0, playerDead = false;
let stars = [], lastTime = 0, animId;

// ─── STARS ───
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, speed: Math.random()*1.5+0.3, alpha: Math.random()*0.6+0.2 });
  }
}

// ─── INIT GAME ───
function initGame() {
  score = 0; lives = 3; gameTime = 0;
  doubleShot = false; doubleShotTimer = 0;
  bossActive = false; boss = null;
  playerDead = false; respawnTimer = 0;
  player = { x: W/2, y: H-100, vx: 0, vy: 0, w: 36, h: 40, color: '#00ffcc', hitFlash: 0 };
  bullets = []; enemies = []; asteroids = []; enemyBullets = []; particles = []; powerups = [];
  bossBar.style.display = 'none';
  initStars();
}

// ─── SPAWN ───
let spawnTimer = 0, eliteTimer = 0, asteroidTimer = 0;

function spawnNormal() {
  enemies.push({ x: Math.random()*(W-40)+20, y: -30, w: 28, h: 28, vy: 1.5+Math.random()*1.5, type:'normal' });
}
function spawnElite() {
  for (let i=0;i<5;i++) {
    enemies.push({ x: 60+i*100, y: -60-i*20, w: 30, h: 30, vx: 1.5, vy: 1.2, type:'elite', shootTimer: 60+i*20, hp:2 });
  }
}
function spawnAsteroid() {
  let sz = 20+Math.random()*20;
  asteroids.push({ x: Math.random()*(W-80)+40, y: -sz, r: sz, vy: 0.8+Math.random()*1.2, hp:5, maxHp:5, hpVisible:false, rot:0, rotSpeed:(Math.random()-0.5)*0.04 });
}
function maybePowerup(x, y) {
  if (Math.random() < 0.18) powerups.push({ x, y, vy: 1.2, type:'double', t:0 });
}

// ─── PARTICLES ───
function burst(x, y, color, n=10, speed=2.5) {
  for (let i=0;i<n;i++) {
    let a = Math.random()*Math.PI*2, s = Math.random()*speed+0.5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, decay: 0.025+Math.random()*0.03, color, r: 2+Math.random()*2 });
  }
}
function shockwave(x,y) {
  particles.push({ type:'shock', x, y, r:5, maxR:80, life:1, decay:0.03, color:'#ff3366' });
}

// ─── DRAW SHIP (player) ───
function drawPlayer() {
  if (playerDead) return;
  let p = player;
  ctx.save();
  ctx.translate(p.x, p.y);
  if (p.hitFlash > 0) { ctx.globalAlpha = 0.5+Math.sin(p.hitFlash*0.8)*0.5; }
  // Engine glow
  let eg = ctx.createRadialGradient(0, 18, 2, 0, 18, 18);
  eg.addColorStop(0, doubleShot ? '#ff3366cc' : '#00ffcc88');
  eg.addColorStop(1, 'transparent');
  ctx.fillStyle = eg; ctx.beginPath(); ctx.ellipse(0,18,10,18,0,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle = p.hitFlash>0 ? '#ff3366' : '#00ffcc';
  ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(0,-p.h/2); ctx.lineTo(p.w/2, p.h/2); ctx.lineTo(p.w*0.15, p.h*0.25);
  ctx.lineTo(-p.w*0.15, p.h*0.25); ctx.lineTo(-p.w/2, p.h/2); ctx.closePath();
  ctx.fill();
  // Cockpit
  ctx.fillStyle = '#001a14';
  ctx.beginPath(); ctx.ellipse(0,-4,7,9,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ─── DRAW ENEMIES ───
function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.type === 'normal') {
    ctx.fillStyle = '#ff3366'; ctx.shadowColor='#ff3366'; ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(0, e.h/2); ctx.lineTo(e.w/2, -e.h/2); ctx.lineTo(0,-e.h*0.2);
    ctx.lineTo(-e.w/2, -e.h/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff6699'; ctx.beginPath(); ctx.ellipse(0,-2,5,6,0,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#ff9900'; ctx.shadowColor='#ff9900'; ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.moveTo(0,e.h/2); ctx.lineTo(e.w*0.6,-e.h*0.1); ctx.lineTo(e.w/2,-e.h/2);
    ctx.lineTo(0,-e.h*0.3); ctx.lineTo(-e.w/2,-e.h/2); ctx.lineTo(-e.w*0.6,-e.h*0.1); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.ellipse(0,-e.h*0.1,5,6,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ─── DRAW ASTEROID ───
function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);
  ctx.fillStyle='#8866aa'; ctx.strokeStyle='#aa88cc'; ctx.lineWidth=2;
  ctx.shadowColor='#aa66cc'; ctx.shadowBlur=8;
  ctx.beginPath();
  let pts=8;
  for(let i=0;i<pts;i++){
    let ang=i/pts*Math.PI*2, rr=a.r*(0.75+Math.sin(i*2.7+1)*0.25);
    i===0?ctx.moveTo(Math.cos(ang)*rr,Math.sin(ang)*rr):ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // HP bar
  if(a.hpVisible){
    let bw=a.r*2, ratio=a.hp/a.maxHp;
    ctx.fillStyle='#330022'; ctx.fillRect(-bw/2, -a.r-10, bw, 5);
    ctx.fillStyle=ratio>0.4?'#00ff88':'#ff3366';
    ctx.fillRect(-bw/2, -a.r-10, bw*ratio, 5);
    ctx.strokeStyle='#ffffff33'; ctx.lineWidth=1;
    ctx.strokeRect(-bw/2, -a.r-10, bw, 5);
  }
  ctx.restore();
}

// ─── BOSS ───
const BOSS_MAX_HP = 200;
function spawnBoss() {
  boss = { x:W/2, y:100, w:100, h:70, hp:BOSS_MAX_HP, maxHp:BOSS_MAX_HP, vx:1.8, t:0, shootTimer:0, phase:0 };
  bossActive = true;
  bossBar.style.display = 'block';
  enemies = []; asteroids = [];
  burst(W/2, 80, '#ff3366', 30, 4);
}
function updateBoss(dt) {
  if(!boss) return;
  boss.t += dt;
  boss.x += Math.sin(boss.t*0.001*60)*2;
  if(boss.x<60) boss.vx=Math.abs(boss.vx);
  if(boss.x>W-60) boss.vx=-Math.abs(boss.vx);
  boss.x += boss.vx;
  boss.shootTimer += dt;
  if(boss.shootTimer > (boss.hp<BOSS_MAX_HP/2 ? 40 : 60)) {
    boss.shootTimer=0;
    let n=12, extraN=boss.hp<BOSS_MAX_HP/2?18:n;
    for(let i=0;i<extraN;i++){
      let a=i/extraN*Math.PI*2;
      if(Math.random()<0.25) enemyBullets.push({x:boss.x,y:boss.y+20,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,r:5,color:'#ff3366',boss:true});
    }
  }
  bossBarInner.style.width = (boss.hp/boss.maxHp*100)+'%';
}
function drawBoss() {
  if(!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);
  // Glow
  let g=ctx.createRadialGradient(0,0,10,0,0,70);
  g.addColorStop(0,'#ff336644'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(0,0,70,50,0,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle='#cc0033'; ctx.shadowColor='#ff3366'; ctx.shadowBlur=20;
  ctx.beginPath();
  ctx.moveTo(0,-boss.h/2); ctx.lineTo(boss.w/2,boss.h*0.2);
  ctx.lineTo(boss.w*0.3,boss.h/2); ctx.lineTo(-boss.w*0.3,boss.h/2);
  ctx.lineTo(-boss.w/2,boss.h*0.2); ctx.closePath(); ctx.fill();
  // Wings
  ctx.fillStyle='#880022';
  ctx.beginPath(); ctx.moveTo(boss.w/2,0); ctx.lineTo(boss.w,boss.h*0.3); ctx.lineTo(boss.w*0.6,boss.h*0.4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-boss.w/2,0); ctx.lineTo(-boss.w,boss.h*0.3); ctx.lineTo(-boss.w*0.6,boss.h*0.4); ctx.closePath(); ctx.fill();
  // Eye
  ctx.fillStyle='#ff6699'; ctx.beginPath(); ctx.ellipse(0,0,18,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(0,0,8,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff0044'; ctx.beginPath(); ctx.ellipse(0,0,4,4,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

// ─── COLLISION ───
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax-aw/2<bx+bw/2&&ax+aw/2>bx-bw/2&&ay-ah/2<by+bh/2&&ay+ah/2>by-bh/2;
}
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  let dx=Math.abs(cx-rx), dy=Math.abs(cy-ry);
  if(dx>rw/2+cr||dy>rh/2+cr) return false;
  if(dx<=rw/2||dy<=rh/2) return true;
  return (dx-rw/2)**2+(dy-rh/2)**2<=cr**2;
}

// ─── MAIN LOOP ───
function loop(ts) {
  let dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  if(state==='PLAYING') update(dt);
  render();
  animId = requestAnimationFrame(loop);
}

function update(dt) {
  gameTime += dt;

  // Player movement
  if(!playerDead){
    if(keys['ArrowLeft']||keys['a']) player.vx -= 0.5;
    if(keys['ArrowRight']||keys['d']) player.vx += 0.5;
    if(keys['ArrowUp']||keys['w']) player.vy -= 0.4;
    if(keys['ArrowDown']||keys['s']) player.vy += 0.4;
    player.vx *= 0.88; player.vy *= 0.88;
    player.x = Math.max(20, Math.min(W-20, player.x+player.vx));
    player.y = Math.max(40, Math.min(H-40, player.y+player.vy));
    if(player.hitFlash>0) player.hitFlash--;
  } else {
    respawnTimer -= dt;
    if(respawnTimer <= 0) { playerDead=false; player.x=W/2; player.y=H-100; player.vx=0; player.vy=0; }
  }

  // Shooting
  if(!playerDead&&keys[' ']&&(gameTime%7<2)){
    if(doubleShot){
      bullets.push({x:player.x-12,y:player.y-20,vy:-9,color:'#ff3366'});
      bullets.push({x:player.x+12,y:player.y-20,vy:-9,color:'#ff3366'});
    } else {
      bullets.push({x:player.x,y:player.y-20,vy:-10,color:'#00ffcc'});
    }
  }

  // Double shot timer
  if(doubleShot){ doubleShotTimer-=dt; if(doubleShotTimer<=0){doubleShot=false;} }

  // Stars
  stars.forEach(s=>{ s.y+=s.speed; if(s.y>H) s.y=0; });

  // Bullets
  bullets = bullets.filter(b=>{ b.y+=b.vy; return b.y>-10; });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20; });

  // Spawning
  if(!bossActive){
    spawnTimer+=dt; if(spawnTimer>2200){ spawnTimer=0; spawnNormal(); }
    eliteTimer+=dt; if(eliteTimer>9000){ eliteTimer=0; spawnElite(); }
    asteroidTimer+=dt; if(asteroidTimer>5000){ asteroidTimer=0; spawnAsteroid(); }
    if(gameTime>=80000&&!bossActive) spawnBoss();
  }

  // Normal / Elite enemies
  enemies = enemies.filter(e=>{
    if(e.type==='normal'){
      e.y+=e.vy;
      if(e.y>H+40) return false;
    } else {
      e.x+=e.vx; e.y+=e.vy;
      if(e.x<20||e.x>W-20) e.vx*=-1;
      if(e.y>H+40) return false;
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=80+Math.random()*60;
        if(!playerDead){
          let dx=player.x-e.x, dy=player.y-e.y, d=Math.sqrt(dx*dx+dy*dy);
          enemyBullets.push({x:e.x,y:e.y,vx:dx/d*2.5,vy:dy/d*2.5,r:4,color:'#ff9900',boss:false});
        }
      }
    }
    // Bullet hits enemy
    let hit=false;
    bullets = bullets.filter(b=>{
      if(!hit&&rectsOverlap(b.x,b.y,4,10,e.x,e.y,e.w,e.h)){
        hit=true; burst(e.x,e.y,'#ff6600',6); return false;
      } return true;
    });
    if(hit){
      if(e.type==='elite'){ e.hp--; if(e.hp<=0){score+=50;burst(e.x,e.y,'#ff9900',14);maybePowerup(e.x,e.y);return false;} return true; }
      score+=20; burst(e.x,e.y,'#ff3366',10); maybePowerup(e.x,e.y); return false;
    }
    // Enemy hits player
    if(!playerDead&&rectsOverlap(e.x,e.y,e.w,e.h,player.x,player.y,player.w,player.h)){
      hitPlayer(); burst(e.x,e.y,'#ff3366',12); return false;
    }
    return true;
  });

  // Asteroids
  asteroids = asteroids.filter(a=>{
    a.y+=a.vy; a.rot+=a.rotSpeed;
    if(a.y>H+a.r) return false;
    let hit=false;
    bullets = bullets.filter(b=>{
      if(!hit&&Math.hypot(b.x-a.x,b.y-a.y)<a.r+4){
        hit=true; a.hpVisible=true; a.hp--;
        burst(a.x,a.y,'#aa66cc',5); return false;
      } return true;
    });
    if(a.hp<=0){ score+=80; burst(a.x,a.y,'#cc88ff',18,3); shockwave(a.x,a.y); maybePowerup(a.x,a.y); return false; }
    if(!playerDead&&circleRect(a.x,a.y,a.r,player.x,player.y,player.w,player.h)){
      hitPlayer(); return true;
    }
    return true;
  });

  // Power-ups
  powerups = powerups.filter(p=>{
    p.y+=p.vy; p.t+=dt;
    if(p.y>H+20) return false;
    if(!playerDead&&rectsOverlap(p.x,p.y,18,18,player.x,player.y,player.w,player.h)){
      doubleShot=true; doubleShotTimer=DOUBLE_SHOT_MAX;
      burst(p.x,p.y,'#ff3366',14,3); return false;
    }
    return true;
  });

  // Boss
  if(boss){ updateBoss(dt); }
  // Boss bullet hits player
  if(!playerDead){
    enemyBullets.forEach(b=>{
      if(Math.hypot(b.x-player.x,b.y-player.y)<(b.r||5)+14){ hitPlayer(); b.y=H+100; }
    });
  }
  // Player bullets hit boss
  if(boss){
    bullets = bullets.filter(b=>{
      if(rectsOverlap(b.x,b.y,6,12,boss.x,boss.y,boss.w,boss.h)){
        boss.hp-=1; burst(boss.x+(Math.random()-0.5)*60,boss.y+(Math.random()-0.5)*30,'#ff3366',4); return false;
      } return true;
    });
    if(boss.hp<=0){ bossDefeated(); }
  }

  // Particles
  particles = particles.filter(p=>{
    if(p.type==='shock'){ p.r+=4; p.life-=p.decay; return p.life>0; }
    p.x+=p.vx; p.y+=p.vy; p.life-=p.decay; return p.life>0;
  });
}

function hitPlayer(){
  if(playerDead||player.hitFlash>0) return;
  lives--;
  enemies.forEach(e=>{ burst(e.x,e.y,'#ff3366',8); });
  enemies = [];
  asteroids.forEach(a=>{ burst(a.x,a.y,'#aa66cc',8); });
  asteroids = [];
  enemyBullets = [];
  if(lives<=0){ gameEnd(); return; }
  playerDead=true; respawnTimer=3000;
  player.hitFlash=0;
  burst(player.x,player.y,'#00ffcc',16,3);
  shockwave(player.x,player.y);
}

function bossDefeated(){
  score+=1000;
  burst(boss.x,boss.y,'#ff3366',40,5);
  shockwave(boss.x,boss.y);
  for(let i=0;i<3;i++) setTimeout(()=>burst(boss.x+(Math.random()-0.5)*100,boss.y+(Math.random()-0.5)*60,'#ffcc00',20,4),i*300);
  boss=null; bossActive=false; bossBar.style.display='none';
  enemyBullets=[];
}

function gameEnd(){
  state='GAME_OVER';
  finalScoreEl.textContent=score;
  gameOverScreen.style.display='flex';
}

// ─── RENDER ───
function render(){
  // BG
  ctx.fillStyle='#000810';
  ctx.fillRect(0,0,W,H);
  // Grid lines
  ctx.strokeStyle='#00ffcc08'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=60){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  // Stars
  stars.forEach(s=>{
    ctx.globalAlpha=s.alpha; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }); ctx.globalAlpha=1;

  if(state==='PLAYING'||state==='GAME_OVER'){
    // Particles
    particles.forEach(p=>{
      if(p.type==='shock'){
        ctx.globalAlpha=p.life*0.6; ctx.strokeStyle=p.color; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
      } else {
        ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
    }); ctx.globalAlpha=1;

    // Power-ups
    powerups.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y);
      ctx.rotate(p.t*0.003);
      ctx.fillStyle='#ff3366'; ctx.shadowColor='#ff3366'; ctx.shadowBlur=12;
      ctx.font='bold 16px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⚡',0,0);
      ctx.shadowBlur=0; ctx.restore();
    });

    enemies.forEach(drawEnemy);
    asteroids.forEach(drawAsteroid);
    drawPlayer();
    drawBoss();

    // Enemy bullets
    enemyBullets.forEach(b=>{
      ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r||4,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    });

    // Player bullets
    bullets.forEach(b=>{
      ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=10;
      ctx.fillRect(b.x-2,b.y-8,4,14);
      ctx.shadowBlur=0;
    });

    drawHUD();
  }
}

function drawHUD(){
  // Score
  ctx.fillStyle='#00ffcc'; ctx.font='bold 14px Orbitron'; ctx.textAlign='left';
  ctx.fillText('SCORE: '+score, 14, 28);

  // Lives
  ctx.fillStyle='#ff3366'; ctx.textAlign='right';
  ctx.fillText('♥'.repeat(lives), W-14, 28);

  // Double shot bar
  if(doubleShot){
    let ratio=doubleShotTimer/DOUBLE_SHOT_MAX;
    ctx.fillStyle='#1a0010'; ctx.fillRect(14,36,160,6);
    let g=ctx.createLinearGradient(14,0,14+160,0);
    g.addColorStop(0,'#ff3366'); g.addColorStop(1,'#ff9900');
    ctx.fillStyle=g; ctx.fillRect(14,36,160*ratio,6);
    ctx.strokeStyle='#ff336688'; ctx.lineWidth=1; ctx.strokeRect(14,36,160,6);
    ctx.fillStyle='#ff6699'; ctx.font='bold 9px Share Tech Mono'; ctx.textAlign='left';
    ctx.fillText('DOUBLE SHOT',14,52);
  }

  // Respawn countdown
  if(playerDead){
    let secs=Math.ceil(respawnTimer/1000);
    ctx.fillStyle='#ffffff88'; ctx.font='bold 24px Orbitron';
    ctx.textAlign='center'; ctx.fillText('RESPAWN EN '+secs, W/2, H/2);
  }
}

// ─── INPUT ───
document.addEventListener('keydown',e=>{ keys[e.key]=true; e.preventDefault(); });
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

document.getElementById('startBtn').addEventListener('click',()=>{
  startScreen.style.display='none';
  initGame(); state='PLAYING';
});
document.getElementById('retryBtn').addEventListener('click',()=>{
  gameOverScreen.style.display='none';
  initGame(); state='PLAYING';
});
document.getElementById('menuBtn').addEventListener('click',()=>{
  gameOverScreen.style.display='none';
  startScreen.style.display='flex';
  state='START'; initStars();
});

// ─── START LOOP ───
initStars();
animId = requestAnimationFrame(ts=>{ lastTime=ts; loop(ts); });
</script>
</body>

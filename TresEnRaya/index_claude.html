<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tres en Raya - Claude</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --x-color: #ff3c5a;
      --x-glow: #ff3c5a88;
      --o-color: #00e676;
      --o-glow: #00e67688;
      --bg1: #0a0a1a;
      --bg2: #0d1b3e;
      --cell-bg: rgba(255,255,255,0.04);
      --cell-border: rgba(255,255,255,0.10);
      --cell-hover: rgba(255,255,255,0.09);
      --win-bg: rgba(255,215,0,0.13);
      --win-border: #ffd700;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      background: radial-gradient(ellipse at 20% 20%, #1a0a2e 0%, #0a0a1a 40%, #0d1b3e 100%);
      overflow: hidden;
      position: relative;
    }

    /* ── Particles ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 20px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 30px rgba(120,80,255,0.7), 0 0 60px rgba(120,80,255,0.3);
      text-align: center;
    }

    /* ── Status ── */
    .status {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.85rem, 3vw, 1.1rem);
      letter-spacing: 0.12em;
      padding: 10px 28px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      color: #fff;
      text-align: center;
      min-width: 240px;
      transition: all 0.3s ease;
    }
    .status.x-turn  { border-color: var(--x-color); box-shadow: 0 0 18px var(--x-glow); color: var(--x-color); }
    .status.o-turn  { border-color: var(--o-color); box-shadow: 0 0 18px var(--o-glow); color: var(--o-color); }
    .status.winner  { border-color: #ffd700; box-shadow: 0 0 24px #ffd70066; color: #ffd700; animation: pulse-gold 1s ease infinite; }
    .status.draw    { border-color: #aaa; color: #ccc; }
    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 24px #ffd70066; }
      50%      { box-shadow: 0 0 48px #ffd700aa; }
    }

    /* ── Score ── */
    .scoreboard {
      display: flex;
      gap: 24px;
    }
    .score-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 22px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      min-width: 80px;
    }
    .score-label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
      text-transform: uppercase;
      color: #fff;
    }
    .score-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .score-box.x-box .score-val { color: var(--x-color); text-shadow: 0 0 12px var(--x-glow); }
    .score-box.o-box .score-val { color: var(--o-color); text-shadow: 0 0 12px var(--o-glow); }
    .score-box.draw-box .score-val { color: #888; }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 18px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .cell {
      width: clamp(88px, 22vw, 120px);
      height: clamp(88px, 22vw, 120px);
      border-radius: 14px;
      background: var(--cell-bg);
      border: 1.5px solid var(--cell-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900;
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
      transform-style: preserve-3d;
      perspective: 600px;
      position: relative;
      user-select: none;
      overflow: hidden;
    }
    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .cell:hover:not(.taken) {
      background: var(--cell-hover);
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .cell.taken { cursor: default; }

    .cell .mark {
      display: inline-block;
      animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }
    @keyframes pop {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(5deg);  opacity: 1; }
      100% { transform: scale(1) rotate(0deg);    opacity: 1; }
    }

    .cell.x-cell .mark { color: var(--x-color); text-shadow: 0 0 18px var(--x-glow), 0 0 40px var(--x-glow); }
    .cell.o-cell .mark { color: var(--o-color); text-shadow: 0 0 18px var(--o-glow), 0 0 40px var(--o-glow); }

    .cell.win-cell {
      background: var(--win-bg);
      border-color: var(--win-border);
      box-shadow: 0 0 30px #ffd70044, inset 0 0 20px rgba(255,215,0,0.08);
      animation: win-flash 0.6s ease forwards;
    }
    @keyframes win-flash {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.08); }
      60%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    /* ── Button ── */
    .btn-reset {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 13px 36px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,58,237,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-reset:hover  { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.6); }
    .btn-reset:active { transform: translateY(0); }

    /* ── Confetti overlay ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div id="particles"></div>

<div class="container">
  <h1>Tres en Raya - Claude</h1>

  <div class="scoreboard">
    <div class="score-box x-box">
      <span class="score-label">Jugador X</span>
      <span class="score-val" id="score-x">0</span>
    </div>
    <div class="score-box draw-box">
      <span class="score-label">Empates</span>
      <span class="score-val" id="score-d">0</span>
    </div>
    <div class="score-box o-box">
      <span class="score-label">Jugador O</span>
      <span class="score-val" id="score-o">0</span>
    </div>
  </div>

  <div class="status x-turn" id="status">Turno de X</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button class="btn-reset" id="btn-reset">↺ &nbsp;Nueva Partida</button>
</div>

<script>
/* ── Particles ── */
(function spawnParticles() {
  const container = document.getElementById('particles');
  const colors = ['#7c3aed','#4f46e5','#ff3c5a','#00e676','#ffd700','#00bcd4'];
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*14+8}s;
      animation-delay:${Math.random()*12}s;
      filter:blur(${Math.random()<0.4?1:0}px);
    `;
    container.appendChild(p);
  }
})();

/* ── Game State ── */
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board, current, gameOver, scores = {X:0, O:0, D:0};

function init() {
  board = Array(9).fill('');
  current = 'X';
  gameOver = false;
  document.querySelectorAll('.cell').forEach(c => {
    c.className = 'cell';
    c.innerHTML = '';
  });
  setStatus(`Turno de ${current}`, current === 'X' ? 'x-turn' : 'o-turn');
}

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = `status ${cls}`;
}

function checkWin(b, player) {
  for (const [a,bb,c] of WINS)
    if (b[a] === player && b[bb] === player && b[c] === player) return [a,bb,c];
  return null;
}

function isFull(b) { return b.every(Boolean); }

function placeMark(idx) {
  if (gameOver || board[idx]) return;
  board[idx] = current;
  const cell = document.querySelector(`.cell[data-i="${idx}"]`);
  cell.classList.add('taken', current === 'X' ? 'x-cell' : 'o-cell');
  cell.innerHTML = `<span class="mark">${current}</span>`;

  const win = checkWin(board, current);
  if (win) {
    gameOver = true;
    win.forEach(i => document.querySelector(`.cell[data-i="${i}"]`).classList.add('win-cell'));
    setStatus(`¡${current} ha ganado! 🏆`, 'winner');
    scores[current]++;
    updateScores();
    launchConfetti();
    return;
  }
  if (isFull(board)) {
    gameOver = true;
    setStatus('¡Empate! 🤝', 'draw');
    scores.D++;
    updateScores();
    return;
  }
  current = current === 'X' ? 'O' : 'X';
  setStatus(`Turno de ${current}`, current === 'X' ? 'x-turn' : 'o-turn');
}

function updateScores() {
  document.getElementById('score-x').textContent = scores.X;
  document.getElementById('score-o').textContent = scores.O;
  document.getElementById('score-d').textContent = scores.D;
}

document.querySelectorAll('.cell').forEach(cell => {
  cell.addEventListener('click', () => placeMark(+cell.dataset.i));
});
document.getElementById('btn-reset').addEventListener('click', init);

/* ── Confetti ── */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = Array.from({length:120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: Math.random()*10+4, h: Math.random()*6+3,
    color: ['#ff3c5a','#00e676','#ffd700','#7c3aed','#00bcd4','#fff'][Math.floor(Math.random()*6)],
    vx: (Math.random()-0.5)*4,
    vy: Math.random()*3+2,
    angle: Math.random()*Math.PI*2,
    va: (Math.random()-0.5)*0.2,
    life: 1
  }));

  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.x += p.vx; p.y += p.vy; p.angle += p.va; p.life -= 0.007;
      if (p.life <= 0) continue;
      alive = true;
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  cancelAnimationFrame(frame);
  draw();
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Neon</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #111, #000);
  color:#0ff;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  touch-action:none;
}

#menu, #gameOver {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#000c;
  backdrop-filter: blur(5px);
  z-index:10;
}

h1 {
  text-shadow:0 0 20px #0ff;
}

button {
  padding:12px 20px;
  margin:5px;
  border:none;
  background:#0ff;
  color:#000;
  font-weight:bold;
  border-radius:10px;
  box-shadow:0 0 10px #0ff;
  transition:0.2s;
}
button:active {
  transform:scale(0.9);
}

#gameContainer {
  display:flex;
  margin-top:10px;
}

canvas {
  background:#111;
  border:2px solid #0ff;
  box-shadow:0 0 15px #0ff;
}

#sidePanel {
  background:#111;
  padding:10px;
  width:130px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  margin-left:10px;
  border:2px solid #0ff;
  box-shadow:0 0 10px #0ff;
}

.panelBox {
  margin-bottom:10px;
}

#controls {
  margin-top:15px;
}

.ctrlRow {
  display:flex;
  justify-content:center;
}

.ctrlBtn {
  margin:5px;
  width:65px;
  height:65px;
  font-size:20px;
  background:#0ff;
  color:#000;
  border-radius:12px;
  box-shadow:0 0 10px #0ff;
}
.big {
  width:110px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>TETRIS NEON</h1>
  <button onclick="startGame()">EMPEZAR</button>
</div>

<div id="gameOver" style="display:none;">
  <h2>GAME OVER</h2>
  <p id="finalScore"></p>
  <button onclick="startGame()">REINTENTAR</button>
</div>

<div id="gameContainer">
  <canvas id="game" width="240" height="400"></canvas>

  <div id="sidePanel">
    <div>
      <div class="panelBox">Hold:<br><canvas id="hold" width="80" height="80"></canvas></div>
      <div class="panelBox">Next:<br><canvas id="next" width="80" height="80"></canvas></div>
    </div>
    <div>
      <div>Puntos: <span id="score">0</span></div>
      <div>Líneas: <span id="lines">0</span></div>
      <button onclick="exitGame()">SALIR</button>
    </div>
  </div>
</div>

<div id="controls">
  <div class="ctrlRow">
    <button class="ctrlBtn" onclick="move(-1)">←</button>
    <button class="ctrlBtn" onclick="drop()">↓</button>
    <button class="ctrlBtn" onclick="move(1)">→</button>
  </div>
  <div class="ctrlRow">
    <button class="ctrlBtn big" onclick="rotate()">⟳</button>
    <button class="ctrlBtn big" onclick="hold()">HOLD</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ROWS=20, COLS=12, SIZE=20;

let board, current, nextPiece, holdPiece, canHold;
let score, lines, speed, dropCounter, lastTime;
let running=false;

const colors = {
  I:"#00f0f0",
  O:"#f0f000",
  T:"#a000f0",
  L:"#f0a000",
  J:"#0000f0",
  S:"#00f000",
  Z:"#f00000"
};

const pieces = {
  I:[[1,1,1,1]],
  O:[[1,1],[1,1]],
  T:[[0,1,0],[1,1,1]],
  L:[[1,0],[1,0],[1,1]],
  J:[[0,1],[0,1],[1,1]],
  S:[[0,1,1],[1,1,0]],
  Z:[[1,1,0],[0,1,1]]
};

function newPiece(){
  const keys=Object.keys(pieces);
  const type=keys[Math.floor(Math.random()*keys.length)];
  return {shape:JSON.parse(JSON.stringify(pieces[type])),x:4,y:0,type};
}

function resetGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  score=0; lines=0; speed=500;
  current=newPiece();
  nextPiece=newPiece();
  holdPiece=null;
  canHold=true;
  running=true;
}

function drawBlock(x,y,color){
  ctx.fillStyle=color;
  ctx.shadowColor=color;
  ctx.shadowBlur=10;
  ctx.fillRect(x*SIZE,y*SIZE,SIZE-2,SIZE-2);
  ctx.shadowBlur=0;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  board.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val) drawBlock(x,y,val);
    });
  });

  current.shape.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val) drawBlock(current.x+x,current.y+y,colors[current.type]);
    });
  });
}

function collide(){
  return current.shape.some((row,y)=>
    row.some((val,x)=>{
      if(!val) return false;
      let px=current.x+x;
      let py=current.y+y;
      return px<0||px>=COLS||py>=ROWS||board[py]?.[px];
    })
  );
}

function merge(){
  current.shape.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val) board[current.y+y][current.x+x]=colors[current.type];
    });
  });
}

function rotate(){
  const rotated=current.shape[0].map((_,i)=>current.shape.map(r=>r[i]).reverse());
  const prev=current.shape;
  current.shape=rotated;
  if(collide()) current.shape=prev;
}

function move(dir){
  current.x+=dir;
  if(collide()) current.x-=dir;
}

function drop(){
  current.y++;
  if(collide()){
    current.y--;
    merge();
    clearLines();
    current=nextPiece;
    nextPiece=newPiece();
    canHold=true;
    if(collide()) gameOver();
  }
}

function clearLines(){
  let count=0;
  board=board.filter(row=>{
    if(row.every(v=>v)){ count++; return false;}
    return true;
  });
  while(board.length<ROWS) board.unshift(Array(COLS).fill(0));

  if(count){
    score+=[0,10,20,40,80][count];
    lines+=count;
    speed=Math.max(100,500-Math.floor(lines/5)*50);
  }

  document.getElementById("score").innerText=score;
  document.getElementById("lines").innerText=lines;
}

function hold(){
  if(!canHold) return;
  if(!holdPiece){
    holdPiece=current;
    current=nextPiece;
    nextPiece=newPiece();
  }else{
    [current,holdPiece]=[holdPiece,current];
    current.x=4; current.y=0;
  }
  canHold=false;
}

function update(time=0){
  if(!running) return;
  const delta=time-lastTime;
  lastTime=time;
  dropCounter+=delta;

  if(dropCounter>speed){
    drop();
    dropCounter=0;
  }

  draw();
  requestAnimationFrame(update);
}

function startGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("gameOver").style.display="none";
  resetGame();
  lastTime=0;
  dropCounter=0;
  requestAnimationFrame(update);
}

function gameOver(){
  running=false;
  document.getElementById("finalScore").innerText="Puntos: "+score;
  document.getElementById("gameOver").style.display="flex";
}

function exitGame(){
  running=false;
  document.getElementById("menu").style.display="flex";
}

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") move(-1);
  if(e.key==="ArrowRight") move(1);
  if(e.key==="ArrowDown") drop();
  if(e.key==="ArrowUp"||e.key===" ") rotate();
  if(e.key==="c"||e.key==="Shift") hold();
});
</script>

</body>
</html>

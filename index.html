<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Pro - HTML5 Canvas</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-layout {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        canvas#tetris {
            border: 4px solid #333;
            background-color: #000;
            display: block;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 120px;
        }

        .panel-box {
            background: #222;
            border: 2px solid #444;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
        }

        canvas.preview-canvas {
            background: #000;
            margin-top: 5px;
            border: 1px solid #333;
        }

        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 20px; font-weight: bold; color: #0ad; margin-top: 5px; }

        .controls-hint {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
            max-width: 400px;
            text-align: center;
            line-height: 1.5;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            border: 2px solid #f44;
            z-index: 10;
        }

        button {
            background: #0ad;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
        }

        button:hover { background: #08b; }
    </style>
</head>
<body>

    <div id="game-layout">
        <!-- Panel Izquierdo: Pieza Guardada -->
        <div class="side-panel">
            <div class="panel-box">
                <div class="stat-label">GUARDAR</div>
                <canvas id="hold" width="80" height="80" class="preview-canvas"></canvas>
                <div style="font-size: 10px; color: #444; margin-top: 5px;">[TECLA C]</div>
            </div>
        </div>

        <!-- Centro: Juego Principal -->
        <div id="game-container">
            <canvas id="tetris" width="240" height="400"></canvas>
            
            <div id="game-over">
                <h2 style="color: #f44; margin-top: 0;">¡FIN DEL JUEGO!</h2>
                <div class="stat-label">PUNTUACIÓN FINAL</div>
                <div id="final-score" class="stat-value" style="font-size: 32px; margin-bottom: 20px;">0</div>
                <button onclick="resetGame()">Jugar de Nuevo</button>
            </div>
        </div>

        <!-- Panel Derecho: Siguiente y Stats -->
        <div class="side-panel">
            <div class="panel-box">
                <div class="stat-label">SIGUIENTE</div>
                <canvas id="next" width="80" height="80" class="preview-canvas"></canvas>
            </div>
            
            <div class="panel-box">
                <div class="stat-label">PUNTOS</div>
                <div id="score" class="stat-value">0</div>
            </div>

            <div class="panel-box">
                <div class="stat-label">LÍNEAS</div>
                <div id="lines" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div class="controls-hint">
        <b>Flechas:</b> Mover y bajar | <b>Espacio / Arriba:</b> Rotar<br>
        <b>C / Shift:</b> Guardar pieza (Hold)
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        const holdCanvas = document.getElementById('hold');
        const holdContext = holdCanvas.getContext('2d');

        const scoreElement = document.getElementById('score');
        const linesElement = document.getElementById('lines');
        const gameOverScreen = document.getElementById('game-over');

        context.scale(20, 20);
        nextContext.scale(20, 20);
        holdContext.scale(20, 20);

        const colors = [
            null,
            '#FF0D72', // I
            '#0DC2FF', // L
            '#0DFF72', // J
            '#F538FF', // O
            '#FF8E0D', // Z
            '#FFE138', // S
            '#3877FF', // T
        ];

        // Partículas para el efecto de explosión
        let particles = [];
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.alpha = 1;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
                this.alpha = Math.max(0, this.life);
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 0.15, 0.15);
                ctx.restore();
            }
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function drawMatrix(matrix, offset, ctx = context) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.lineWidth = 0.05;
                        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);

            // Dibujar partículas
            particles.forEach((p, i) => {
                p.update();
                p.draw(context);
                if (p.life <= 0) particles.splice(i, 1);
            });

            drawPreview();
        }

        function drawPreview() {
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                const offX = (4 - nextPiece[0].length) / 2;
                const offY = (4 - nextPiece.length) / 2;
                drawMatrix(nextPiece, {x: offX, y: offY}, nextContext);
            }

            holdContext.fillStyle = '#000';
            holdContext.fillRect(0, 0, holdCanvas.width, holdCanvas.height);
            if (holdPiece) {
                const offX = (4 - holdPiece[0].length) / 2;
                const offY = (4 - holdPiece.length) / 2;
                drawMatrix(holdPiece, {x: offX, y: offY}, holdContext);
            }
        }

        async function arenaSweep() {
            let rowCount = 1;
            let linesToClear = [];

            // Identificar qué líneas están llenas
            for (let y = arena.length - 1; y > 0; --y) {
                let full = true;
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        full = false;
                        break;
                    }
                }
                if (full) linesToClear.push(y);
            }

            if (linesToClear.length > 0) {
                isPaused = true; // Pausar momentáneamente para el efecto

                // Crear partículas y efecto visual
                linesToClear.forEach(y => {
                    for (let x = 0; x < arena[y].length; x++) {
                        const color = colors[arena[y][x]];
                        // Crear varias partículas por bloque
                        for (let i = 0; i < 5; i++) {
                            particles.push(new Particle(x + 0.5, y + 0.5, color));
                        }
                    }
                });

                // Pequeña espera para mostrar el "flash" (rellenando de blanco)
                draw(); // Redibujar antes del flash
                context.fillStyle = 'rgba(255, 255, 255, 0.8)';
                linesToClear.forEach(y => {
                    context.fillRect(0, y, arena[0].length, 1);
                });

                await new Promise(resolve => setTimeout(resolve, 100));

                // Eliminar las líneas de la matriz
                linesToClear.forEach(y => {
                    const row = arena.splice(y, 1)[0].fill(0);
                    arena.unshift(row);
                    
                    player.score += rowCount * 10;
                    player.lines += 1;
                    rowCount *= 2;
                });

                if (player.lines % 5 === 0) dropInterval = Math.max(100, dropInterval - 50);
                
                isPaused = false;
                updateScore();
                update(); 
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            if (isPaused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (isPaused) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        let nextPiece = null;
        let holdPiece = null;
        let canHold = true;

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (!nextPiece) nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.matrix = nextPiece;
            nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            canHold = true;
            if (collide(arena, player)) gameOver();
        }

        function playerHold() {
            if (!canHold || isPaused) return;
            if (!holdPiece) {
                holdPiece = player.matrix;
                playerReset();
            } else {
                const temp = player.matrix;
                player.matrix = holdPiece;
                holdPiece = temp;
                player.pos.y = 0;
                player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            }
            canHold = false;
            draw();
        }

        function playerRotate(dir) {
            if (isPaused) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            linesElement.innerText = player.lines;
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isPaused = false;

        function update(time = 0) {
            if (isPaused) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        function gameOver() {
            isPaused = true;
            document.getElementById('final-score').innerText = player.score;
            gameOverScreen.style.display = 'block';
        }

        function resetGame() {
            arena.forEach(row => row.fill(0));
            particles = [];
            player.score = 0;
            player.lines = 0;
            dropInterval = 1000;
            holdPiece = null;
            nextPiece = null;
            isPaused = false;
            gameOverScreen.style.display = 'none';
            playerReset();
            updateScore();
            update();
        }

        document.addEventListener('keydown', event => {
            if (isPaused && !gameOverScreen.style.display === 'block') return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38 || event.keyCode === 32) {
                event.preventDefault();
                playerRotate(1);
            } else if (event.keyCode === 67 || event.keyCode === 16) {
                playerHold();
            }
        });

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, lines: 0 };

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
